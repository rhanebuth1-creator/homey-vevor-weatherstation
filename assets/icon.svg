<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- White background -->
  <rect width="100" height="100" fill="white"/>
  <!-- Weather station pole -->
  <rect x="48" y="55" width="4" height="35" fill="#888" rx="2"/>
  <!-- Base -->
  <rect x="38" y="87" width="24" height="5" fill="#888" rx="2"/>
  <!-- Anemometer (wind cups) center -->
  <circle cx="50" cy="38" r="3" fill="#555"/>
  <!-- Anemometer arms -->
  <line x1="50" y1="38" x2="50" y2="25" stroke="#555" stroke-width="1.5"/>
  <line x1="50" y1="38" x2="61" y2="44" stroke="#555" stroke-width="1.5"/>
  <line x1="50" y1="38" x2="39" y2="44" stroke="#555" stroke-width="1.5"/>
  <!-- Wind cups -->
  <circle cx="50" cy="23" r="4" fill="#4a90d9"/>
  <circle cx="63" cy="46" r="4" fill="#4a90d9"/>
  <circle cx="37" cy="46" r="4" fill="#4a90d9"/>
  <!-- Wind vane -->
  <line x1="50" y1="55" x2="50" y2="48" stroke="#555" stroke-width="1.5"/>
  <polygon points="50,48 47,54 53,54" fill="#e74c3c"/>
  <polygon points="50,60 47,54 53,54" fill="#aaa"/>
  <!-- Temperature sensor box -->
  <rect x="30" y="62" width="14" height="18" fill="#f5f5f5" stroke="#ccc" stroke-width="1" rx="2"/>
  <line x1="34" y1="66" x2="40" y2="66" stroke="#aaa" stroke-width="1"/>
  <line x1="34" y1="69" x2="40" y2="69" stroke="#aaa" stroke-width="1"/>
  <line x1="34" y1="72" x2="40" y2="72" stroke="#aaa" stroke-width="1"/>
  <line x1="34" y1="75" x2="40" y2="75" stroke="#aaa" stroke-width="1"/>
  <!-- Rain gauge -->
  <rect x="58" y="64" width="10" height="16" fill="#d6eaf8" stroke="#4a90d9" stroke-width="1" rx="1"/>
  <polygon points="58,64 68,64 65,60 61,60" fill="#4a90d9"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bfe3ff"/>
      <stop offset="60%" stop-color="#8fcdf0"/>
      <stop offset="100%" stop-color="#1A4A7A"/>
    </linearGradient>
    <linearGradient id="cloud" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d6e6f5"/>
    </linearGradient>
  </defs>

  <!-- Background sky -->
  <rect width="1000" height="700" fill="url(#sky)"/>

  <!-- Distant hills -->
  <path d="M0,560 C150,500 300,620 480,560 C660,500 800,610 1000,540 L1000,700 L0,700 Z" fill="#13395e" opacity="0.55"/>
  <path d="M0,610 C180,570 360,650 560,600 C760,560 880,650 1000,610 L1000,700 L0,700 Z" fill="#0f2d4a"/>

  <!-- Sun -->
  <g>
    <circle cx="760" cy="160" r="80" fill="#f5a623"/>
    <g stroke="#f5a623" stroke-width="10" stroke-linecap="round">
      <line x1="760" y1="30" x2="760" y2="0"/>
      <line x1="760" y1="320" x2="760" y2="290"/>
      <line x1="630" y1="160" x2="600" y2="160"/>
      <line x1="920" y1="160" x2="890" y2="160"/>
      <line x1="668" y1="68" x2="648" y2="48"/>
      <line x1="852" y1="252" x2="872" y2="272"/>
      <line x1="852" y1="68" x2="872" y2="48"/>
      <line x1="668" y1="252" x2="648" y2="272"/>
    </g>
  </g>

  <!-- Wind swirls -->
  <g stroke="#ffffff" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.85">
    <path d="M40,180 C160,180 160,140 240,140 C300,140 300,170 350,170"/>
    <path d="M70,240 C200,240 200,210 280,210"/>
  </g>

  <!-- Big cloud -->
  <g>
    <ellipse cx="430" cy="300" rx="160" ry="90" fill="url(#cloud)"/>
    <ellipse cx="320" cy="330" rx="110" ry="70" fill="url(#cloud)"/>
    <ellipse cx="560" cy="330" rx="120" ry="75" fill="url(#cloud)"/>
    <rect x="240" y="300" width="400" height="80" fill="url(#cloud)"/>
  </g>

  <!-- Smaller cloud -->
  <g opacity="0.9">
    <ellipse cx="170" cy="120" rx="80" ry="45" fill="#ffffff"/>
    <ellipse cx="230" cy="135" rx="60" ry="38" fill="#ffffff"/>
    <rect x="130" y="118" width="170" height="40" fill="#ffffff"/>
  </g>

  <!-- Rain drops -->
  <g stroke="#4a90d9" stroke-width="9" stroke-linecap="round">
    <line x1="320" y1="430" x2="295" y2="490"/>
    <line x1="380" y1="430" x2="355" y2="490"/>
    <line x1="440" y1="430" x2="415" y2="490"/>
    <line x1="500" y1="430" x2="475" y2="490"/>
    <line x1="560" y1="430" x2="535" y2="490"/>
    <line x1="350" y1="500" x2="325" y2="560"/>
    <line x1="470" y1="500" x2="445" y2="560"/>
  </g>

  <!-- Lightning bolt accent -->
  <polygon points="640,420 600,520 640,520 605,610 690,490 645,490" fill="#ffd84a"/>

  <!-- Ground -->
  <rect x="0" y="640" width="1000" height="60" fill="#0c2238"/>
</svg>

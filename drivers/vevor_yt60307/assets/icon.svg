<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Mast -->
  <rect x="47" y="35" width="6" height="55" rx="2" fill="#1A4A7A"/>
  <rect x="38" y="88" width="24" height="6" rx="2" fill="#1A4A7A"/>

  <!-- Anemometer arms -->
  <g stroke="#1A4A7A" stroke-width="3" stroke-linecap="round">
    <line x1="50" y1="18" x2="50" y2="30"/>
    <line x1="50" y1="18" x2="34" y2="26"/>
    <line x1="50" y1="18" x2="66" y2="26"/>
  </g>
  <!-- Anemometer cups -->
  <circle cx="50" cy="14" r="6" fill="#4a90d9"/>
  <circle cx="31" cy="28" r="6" fill="#4a90d9"/>
  <circle cx="69" cy="28" r="6" fill="#4a90d9"/>

  <!-- Wind vane -->
  <g transform="translate(74,40) rotate(20)">
    <line x1="0" y1="0" x2="22" y2="0" stroke="#1A4A7A" stroke-width="3" stroke-linecap="round"/>
    <polygon points="22,-7 36,0 22,7" fill="#f5a623"/>
  </g>

  <!-- Sensor housing with solar panel -->
  <rect x="36" y="48" width="22" height="14" rx="2" fill="#b0c4de"/>
  <rect x="38" y="50" width="18" height="6" rx="1" fill="#1A4A7A"/>

  <!-- Rain drop accent -->
  <path d="M22,70 C22,64 28,58 28,58 C28,58 34,64 34,70 A6,6 0 0 1 22,70 Z" fill="#4a90d9"/>
</svg>

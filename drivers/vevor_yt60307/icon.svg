<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Pole -->
  <line x1="50" y1="55" x2="50" y2="90"/>
  <!-- Base -->
  <line x1="38" y1="90" x2="62" y2="90"/>
  <!-- Anemometer center -->
  <circle cx="50" cy="35" r="3"/>
  <!-- Anemometer arms -->
  <line x1="50" y1="35" x2="50" y2="22"/>
  <line x1="50" y1="35" x2="61" y2="42"/>
  <line x1="50" y1="35" x2="39" y2="42"/>
  <!-- Wind cups (circles) -->
  <circle cx="50" cy="19" r="4"/>
  <circle cx="63" cy="45" r="4"/>
  <circle cx="37" cy="45" r="4"/>
  <!-- Wind vane -->
  <line x1="50" y1="55" x2="50" y2="46"/>
  <polygon points="50,46 46,53 54,53" stroke-width="2"/>
  <!-- Sensor box -->
  <rect x="30" y="60" width="14" height="18" rx="2"/>
  <line x1="33" y1="64" x2="41" y2="64"/>
  <line x1="33" y1="68" x2="41" y2="68"/>
  <line x1="33" y1="72" x2="41" y2="72"/>
  <!-- Rain gauge -->
  <rect x="58" y="63" width="10" height="15" rx="1"/>
  <polyline points="56,63 60,58 68,58 72,63"/>
</svg>
